name: Deploy to AWS

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to confirm"
        required: true
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DEPLOY'
    steps:
      - name: Deploy via API
        run: |
          RESPONSE=$(curl -s -X POST ${{ secrets.SERVER_URL }}/api/deploy \
            -H "Content-Type: application/json" \
            -d '{"token": "${{ secrets.DEPLOY_TOKEN }}", "action": "deploy"}')
          echo "$RESPONSE"
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "Deploy successful!"
          else
            echo "Deploy failed!"
            exit 1
          fi
